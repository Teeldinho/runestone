pre-commit:
  commands:
    protect-branches:
      run: |
        branch=$(git symbolic-ref HEAD | sed 's|refs/heads/||')
        if [ "$branch" = "main" ] || [ "$branch" = "develop" ]; then
          echo "Direct commits to $branch are forbidden. Use a feature branch."
          exit 1
        fi
    biome:
      run: npm run lint:fix
    lint:ci:
      run: npm run lint:ci
    purity:
      run: npm run lint:purity
    fsd:
      run: npm run lint:fsd

pre-push:
  commands:
    theme:
      run: npm run theme:check
    typecheck:
      run: npm run typecheck
    test:
      run: npm run test:run
