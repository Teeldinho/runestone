id: no-deprecated-shared-utils-import
language: TypeScript
severity: warning
message: "The '@/shared/lib/utils' shim is deprecated; import from '@/shared/lib/cn' or the shared lib public API."
rule:
  any:
    - pattern: import { $$$IMPORTS } from "@/shared/lib/utils"
    - pattern: import $DEFAULT from "@/shared/lib/utils"
    - pattern: import { $$$IMPORTS } from '@/shared/lib/utils'
    - pattern: import $DEFAULT from '@/shared/lib/utils'
