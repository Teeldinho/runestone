id: no-static-inline-style
language: Tsx
severity: error
message: "Avoid static inline style props in UI components; use Tailwind className for non-runtime values."
files:
  - src/**/ui/**/*.tsx
ignores:
  - src/**/*.test.tsx
rule:
  pattern:
    context: '<div style={{ $PROPERTY: "$VALUE" }} />'
    selector: jsx_attribute
